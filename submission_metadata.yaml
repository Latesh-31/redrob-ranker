# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-stage pipeline optimized for offline, CPU-only candidate discovery and ranking. In the 
  preprocessing stage, candidate profiles are cleaned and vectorized using a local BGE-small-en-v1.5 
  sentence transformer. In the ranking stage, job descriptions are parsed into structured sections 
  and embedded. Cosine similarity is computed against precalculated candidate vectors to fetch a 
  semantic shortlist of 500. Shortlisted candidates are evaluated against the job description using 
  a weighted scoring model: Semantic (20%), Skills (30%), Experience (25%), Title Relevance (15%), 
  Education Fit (5%), and Platform Activity (5%). Diminishing-return penalties are stacked for profile 
  anomalies (e.g. skill-stuffing, title-chasing) via a multiplicative consistency multiplier to 
  filter out honeypot trap candidates. An optional localized XGBoost classifier dynamically fits 
  on the shortlist to predict matching probabilities and blend them with heuristic scores. Finally, 
  a deterministic template engine generates human-readable reasoning detailing specific strengths 
  and gaps. Average ranking runtime is ~2–4 seconds for 100K candidates on CPU.

